<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>ChronoPlan - Reset Password</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="split">
    <div class="split-left">
      <h1>ChronoPlan</h1>
      <p>Track Your Project, Go Flawless</p>
      <img src="Gambar Depan.svg" alt="ChronoPlan Illustration" class="auth-image">
    </div>
    <div class="split-right">
        <div class="auth-card">
            <h2>Reset Password</h2>
            <p style="font-size: 0.9rem; margin-bottom: 20px;">Enter your details to update your password</p>
            
            <input type="text" placeholder="Username">
            <input type="password" placeholder="New Password">
            <input type="password" placeholder="Confirm New Password">
            
            <a href="signin.html" class="btn btn-primary btn-block">Update</a>
            <a href="signin.html" class="btn btn-soft btn-block">Back to Login</a>
        </div>
    </div>
</div>
</body>
</html>
